<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>licorería</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

nav {
  background: #111;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav h1 {
  margin: 0;
}

nav button {
  background: #444;
  color: white;
  border: none;
  padding: 8px 15px;
  margin-left: 10px;
  cursor: pointer;
  border-radius: 5px;
}

nav button:hover {
  background: #00c853;
}

.container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  padding: 20px;
  justify-content: center;
}

.card {
  width: 230px;
  background: white;
  border-radius: 15px;
  box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
  overflow: hidden;
  transition: all 0.3s ease;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 90%;
  height: 180px;
  object-fit: cover;
}

.card h3 {
  margin: 10px;
}

.card p {
  margin: 0 10px 10px;
  font-size: 14px;
}

.price {
  color: green;
  font-weight: bold;
  margin: 10px;
}


.buy {
  display: block;
  margin: 10px;
  padding: 10px;
  background: #00c853;
  color: white;
  text-align: center;
  border-radius: 8px;
  cursor: pointer;
}

.buy:hover {
  background: #009624;
}
</style>

</head>

<body>


<nav>
  <h1>licorería</h1>
  <div>
    <button onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar(1)">Cerveza</button>
    <button onclick="filtrar(2)">Tequila</button>
    <button onclick="filtrar(3)">Ron</button>
  </div>
</nav>


<div class="container" id="productos"></div>

<script>
const URL = "http://127.0.0.1:8000/api/products/";
let productos = [];

fetch(URL)
  .then(res => res.json())
  .then(data => {
    productos = data;
    mostrarProductos(productos);
  });

function mostrarProductos(lista) {
  const contenedor = document.getElementById("productos");
  contenedor.innerHTML = "";

  lista.forEach(p => {
    contenedor.innerHTML += `
      <div class="card">
        <img src="${p.images}">
        <h3>${p.title}</h3>
        <p>${p.description}</p>
        <p class="price">$${p.price}</p>
        <div class="buy">Comprar</div>
      </div>
    `;
  });
}

function filtrar(categoria) {
  if (categoria === 'todos') {
    mostrarProductos(productos);
  } else {
    const filtrados = productos.filter(p => p.category_id == categoria);
    mostrarProductos(filtrados);
  }
}
</script>

</body>
</html>
